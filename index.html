<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Trading Replay - HK</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #0d1117; color: #c9d1d9;
    height: 100%; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 500px; margin: 0 auto;
    padding-top: env(safe-area-inset-top);
  }

  /* Top Bar (stock selector) */
  #topbar {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; background: #161b22;
    border-bottom: 1px solid #30363d; flex-shrink: 0; z-index: 20;
    position: relative;
  }
  #stock-selector {
    flex: 1; position: relative;
  }
  #search-box {
    width: 100%; padding: 8px 10px; border-radius: 8px;
    border: 1px solid #30363d; background: #0d1117;
    color: #c9d1d9; font-size: 14px; font-family: monospace;
    -webkit-appearance: none; outline: none;
  }
  #search-box:focus { border-color: #58a6ff; }
  #search-box::placeholder { color: #484f58; }
  #dropdown {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    max-height: 280px; overflow-y: auto; z-index: 30;
    background: #161b22; border: 1px solid #30363d; border-radius: 0 0 8px 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #dropdown.open { display: block; }
  #dropdown .item {
    padding: 9px 12px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid #21262d; display: flex; justify-content: space-between;
  }
  #dropdown .item:active { background: #1f2937; }
  #dropdown .item .code { font-family: monospace; color: #58a6ff; font-weight: 600; }
  #dropdown .item .name { color: #8b949e; font-size: 12px; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #current-stock {
    font-size: 11px; color: #8b949e; min-width: 55px; text-align: center;
    font-family: monospace; white-space: nowrap;
  }

  /* Stats Row */
  #stats {
    display: flex; gap: 0; flex-shrink: 0;
    background: #161b22; border-bottom: 1px solid #30363d;
  }
  #stats .st {
    flex: 1; text-align: center; padding: 6px 2px;
  }
  #stats .st .lbl { font-size: 9px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  #stats .st .val { font-size: 15px; font-weight: 700; }
  .val.win { color: #3fb950; } .val.loss { color: #f85149; } .val.neutral { color: #d29922; }

  /* Chart */
  #chart-container {
    flex: 1; position: relative; overflow: hidden;
    background: #161b22; min-height: 0;
  }
  #chart {
    display: block; width: 100%; height: 100%;
    touch-action: none;
  }
  #chart-info {
    position: absolute; top: 8px; left: 10px; z-index: 5;
    font-size: 11px; font-family: monospace; line-height: 1.5;
    background: rgba(13,17,23,0.8); padding: 4px 8px; border-radius: 4px;
    pointer-events: none;
  }
  #chart-info .date { color: #8b949e; }
  #chart-info .ohlc { color: #c9d1d9; }
  #chart-info .pct-up { color: #3fb950; }
  #chart-info .pct-down { color: #f85149; }
  #chart-info .holding { color: #d29922; }

  /* Position Banner */
  #pos-banner {
    display: none; align-items: center; justify-content: space-between;
    padding: 8px 12px; flex-shrink: 0;
    background: rgba(210,153,34,0.12); border-bottom: 1px solid rgba(210,153,34,0.3);
  }
  #pos-banner.active { display: flex; }
  #pos-banner .pos-info { font-size: 12px; color: #d29922; flex: 1; }
  #pos-banner .pos-pl { font-size: 18px; font-weight: 700; }
  #pos-banner .pos-pl.up { color: #3fb950; }
  #pos-banner .pos-pl.down { color: #f85149; }

  /* Slider */
  #slider-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px; flex-shrink: 0;
    background: #161b22; border-bottom: 1px solid #30363d;
  }
  #slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: #30363d; border-radius: 2px; outline: none; margin: 8px 0;
  }
  #slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px;
    border-radius: 50%; background: #58a6ff; border: 2px solid #0d1117;
  }
  #slider-val { font-size: 10px; color: #8b949e; min-width: 75px; text-align: right; font-family: monospace; }

  /* Zoom */
  #zoom-row {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; flex-shrink: 0;
    background: #161b22; border-bottom: 1px solid #30363d;
  }
  #zoom-row label { font-size: 11px; color: #8b949e; }
  #zoom-val { font-size: 12px; color: #58a6ff; min-width: 28px; text-align: center; }
  .small-btn {
    width: 32px; height: 32px; border-radius: 6px;
    border: 1px solid #30363d; background: #21262d;
    color: #c9d1d9; font-size: 16px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  /* Nav */
  #nav-row {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; flex-shrink: 0;
    background: #161b22; border-bottom: 1px solid #30363d;
  }
  .nav-btn {
    flex: 1; height: 36px; border-radius: 6px;
    border: 1px solid #30363d; background: #21262d;
    color: #c9d1d9; font-size: 13px; font-weight: 500;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #btn-reset { color: #d29922; }

  /* Action Bar */
  #action-bar {
    display: flex; gap: 8px; padding: 8px 10px;
    background: #161b22; border-top: 1px solid #30363d;
    flex-shrink: 0; z-index: 10;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }
  #action-bar button {
    flex: 1; height: 48px; border-radius: 10px;
    border: none; font-size: 16px; font-weight: 700;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  #action-bar button:active { transform: scale(0.96); }
  #btn-buy { background: #3fb950; color: #0d1117; }
  #btn-sell { background: #f85149; color: #fff; }
  #btn-cancel { background: #21262d; color: #d29922; border: 1px solid #30363d; }
  #action-bar button:disabled { opacity: 0.35; }

  /* Trade Log */
  #log-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; flex-shrink: 0;
    background: #161b22; border-bottom: 1px solid #30363d;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #log-toggle .arrow { font-size: 10px; transition: transform 0.2s; color: #8b949e; }
  #log-toggle.open .arrow { transform: rotate(90deg); }
  #log-toggle span { font-size: 12px; color: #8b949e; }
  #trade-log {
    display: none; flex-shrink: 0; overflow-y: auto;
    max-height: 150px; background: #161b22;
    border-bottom: 1px solid #30363d;
  }
  #trade-log.open { display: block; }
  #trade-log-table {
    width: 100%; border-collapse: collapse; font-size: 11px; font-family: monospace;
  }
  #trade-log-table th, #trade-log-table td {
    padding: 3px 6px; text-align: right; border-bottom: 1px solid #21262d; white-space: nowrap;
  }
  #trade-log-table th { color: #8b949e; font-weight: 500; font-size: 10px; }
  #trade-log-table td.profit { color: #3fb950; }
  #trade-log-table td.loss { color: #f85149; }

  /* Toast */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px; font-size: 13px;
    background: #30363d; color: #c9d1d9; z-index: 100;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap; max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; }

  .loading-spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid #30363d; border-top-color: #58a6ff;
    border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="stock-selector">
      <input type="text" id="search-box" placeholder="Search HK stocks..." autocomplete="off" inputmode="search">
      <div id="dropdown"></div>
    </div>
    <span id="current-stock">0700.HK</span>
  </div>

  <div id="stats">
    <div class="st"><div class="lbl">Capital</div><div class="val" id="stat-capital" style="color:#d29922;">¥100,000</div></div>
    <div class="st"><div class="lbl">Trades</div><div class="val neutral" id="stat-trades">0</div></div>
    <div class="st"><div class="lbl">Win%</div><div class="val neutral" id="stat-winrate">-</div></div>
    <div class="st"><div class="lbl">P&L</div><div class="val neutral" id="stat-totalpl">+0.00%</div></div>
    <div class="st"><div class="lbl">Day</div><div class="val" id="stat-day" style="color:#58a6ff;">0</div></div>
  </div>

  <div id="pos-banner">
    <div class="pos-info">
      <div>Holding since <span id="pos-date">-</span> @ <span id="pos-price">-</span></div>
      <div style="font-size:11px;color:#8b949e;"><span id="pos-days">0</span>d</div>
    </div>
    <div class="pos-pl" id="pos-pl">0.00%</div>
  </div>

  <div id="chart-container">
    <div id="chart-info"></div>
    <canvas id="chart"></canvas>
  </div>

  <div id="slider-row">
    <input type="range" id="slider" min="19" max="19" value="19">
    <span id="slider-val"></span>
  </div>

  <div id="nav-row">
    <button class="nav-btn" onclick="jumpDays(-20)">-20d</button>
    <button class="nav-btn" onclick="jumpDays(-5)">-5d</button>
    <button class="nav-btn" onclick="jumpDays(-1)">-1d</button>
    <button class="nav-btn" onclick="jumpDays(1)">+1d</button>
    <button class="nav-btn" onclick="jumpDays(5)">+5d</button>
    <button class="nav-btn" onclick="jumpDays(20)">+20d</button>
    <button class="nav-btn" id="btn-reset" onclick="resetAll()">Reset</button>
  </div>

  <div id="action-bar">
    <button id="btn-buy" onclick="buyAtClose()">Buy at Close</button>
    <button id="btn-sell" onclick="sellAtClose()" disabled>Sell at Close</button>
    <button id="btn-cancel" onclick="cancelPosition()" disabled style="max-width:60px;">&#10005;</button>
  </div>

  <div id="log-toggle" onclick="toggleLog()">
    <span class="arrow">&#9654;</span>
    <span>Trade History (<span id="log-count">0</span>)</span>
  </div>
  <div id="trade-log">
    <table id="trade-log-table">
      <thead><tr>
        <th style="text-align:left;">#</th><th style="text-align:left;">Entry</th>
        <th>In</th><th style="text-align:left;">Exit</th>
        <th>Out</th><th>Sh</th><th>D</th><th>Net P&L</th>
      </tr></thead>
      <tbody id="trade-log-body"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

let currentCode = '0700';
let currentName = 'Tencent Holdings Limited';

// ===== STATE =====
let cursor = START_INDEX;
let maxCursor = START_INDEX;  // furthest position unlocked (blind replay)
let position = null;
let trades = [];
let drawCount = 0;
const INITIAL_CAPITAL = 100000;
const TRADE_COST = 0.001;  // 0.1% per side
let cash = INITIAL_CAPITAL;
let shares = 0;

// ===== INDICATORS =====
function computeIndicators(arr) {
  for (let i = 0; i < arr.length; i++) {
    if (i === 0) arr[i].pct = 0;
    else arr[i].pct = Math.round((arr[i].close - arr[i-1].close) / arr[i-1].close * 10000) / 100;
  }
  for (let i = 0; i < arr.length; i++) {
    if (i >= 9) { let s = 0; for (let j = i-9; j <= i; j++) s += arr[j].volume; arr[i].vma10 = Math.round(s/10); }
    else arr[i].vma10 = 0;
    if (i >= 19) { let s = 0; for (let j = i-19; j <= i; j++) s += arr[j].volume; arr[i].vma20 = Math.round(s/20); }
    else arr[i].vma20 = 0;
  }
}

// ===== STOCK LOADING =====
async function loadStockData(code, name) {
  if (code === currentCode && DATA.length > 0) return;

  showToast('Loading ' + code + '.HK...');
  document.body.classList.add('loading');

  // Check cache first
  const cacheKey = 'hk_stock_' + code;
  let arr = null;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      // Handle wrapped format in cache
      if (parsed.data && Array.isArray(parsed.data)) {
        arr = parsed.data;
      } else if (Array.isArray(parsed) && parsed.length > 60) {
        arr = parsed;
      }
    }
  } catch(e) {}

  if (!arr) {
    try {
      const resp = await fetch(code + '.json');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      arr = await resp.json();
      // Handle wrapped format: {code, name, count, data} from fetch_hk_serial.py
      if (arr.data && Array.isArray(arr.data)) {
        arr = arr.data;
      }
      if (!Array.isArray(arr) || arr.length < 60) throw new Error('Only ' + (arr.length || '0') + ' candles');
      // Cache in localStorage (up to ~5MB per stock, but most are ~400KB)
      try {
        const str = JSON.stringify(arr);
        if (str.length < 4000000) {
          localStorage.setItem(cacheKey, str);
        }
      } catch(e) {
        // Cache full, remove oldest
        try {
          const keys = Object.keys(localStorage).filter(k => k.startsWith('hk_stock_'));
          if (keys.length > 10) {
            for (let i = 0; i < keys.length - 10; i++) localStorage.removeItem(keys[i]);
          }
        } catch(e2) {}
      }
    } catch(err) {
      showToast('Error loading ' + code + ': ' + err.message);
      document.body.classList.remove('loading');
      return;
    }
  }

  computeIndicators(arr);
  DATA = arr;
  currentCode = code;
  currentName = name;
  START_INDEX = Math.floor(arr.length * 0.05);
  CANDLES_MAX = arr.length;
  candlesVisible = Math.min(80, arr.length);
  cursor = START_INDEX;
  maxCursor = START_INDEX;
  position = null;
  trades = [];
  cash = INITIAL_CAPITAL; shares = 0;

  document.getElementById('current-stock').textContent = code + '.HK';
  document.getElementById('search-box').value = '';
  document.getElementById('slider').min = START_INDEX;
  document.getElementById('slider').max = maxCursor;
  document.getElementById('slider').value = cursor;
  updateUI(); draw();
  document.body.classList.remove('loading');
  showToast(code + '.HK loaded (' + arr.length + 'd: ' + arr[0].date + '~' + arr[arr.length-1].date + ')');
}

// ===== CANVAS =====
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resizeCanvas() {
  const container = document.getElementById('chart-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w <= 0 || h <= 0) return;
  canvas.width = Math.round(w * DPR);
  canvas.height = Math.round(h * DPR);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  draw();
}

// ===== DRAW =====
function draw() {
  try {
    drawCount++;
    const physW = canvas.width;
    const physH = canvas.height;
    if (physW <= 0 || physH <= 0) return;
    if (!DATA || !DATA.length || cursor < 0 || cursor >= DATA.length) {
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.clearRect(0, 0, physW / DPR, physH / DPR);
      ctx.fillStyle = '#161b22';
      ctx.fillRect(0, 0, physW / DPR, physH / DPR);
      ctx.fillStyle = '#8b949e';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No data loaded', physW / DPR / 2, physH / DPR / 2);
      return;
    }
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, physW / DPR, physH / DPR);
    ctx.fillStyle = '#161b22';
    ctx.fillRect(0, 0, physW / DPR, physH / DPR);

    const W = physW / DPR;
    const H = physH / DPR;
    const chartLeft = 52;
    const chartRight = W - 8;
    const chartWidth = chartRight - chartLeft;
    const priceTop = 5;
    const priceBottom = H * 0.62;
    const priceHeight = priceBottom - priceTop;
    const volTop = H * 0.66;
    const volBottom = H - 4;
    const volHeight = volBottom - volTop;

    const startIdx = Math.max(0, cursor - candlesVisible + 1);
    const endIdx = cursor;
    const totalVisible = endIdx - startIdx + 1;
    const candleSpace = chartWidth / totalVisible;

    let minP = Infinity, maxP = -Infinity, maxVol = 0, maxVMA = 0, lowestIdx = -1;
    for (let i = startIdx; i <= endIdx; i++) {
      const c = DATA[i];
      if (!c) continue;
      if (c.low !== undefined && c.low < minP) { minP = c.low; lowestIdx = i; }
      if (c.high !== undefined && c.high > maxP) maxP = c.high;
      if (c.volume !== undefined && c.volume > maxVol) maxVol = c.volume;
      if (c.vma10 !== undefined && c.vma10 > maxVMA) maxVMA = c.vma10;
      if (c.vma20 !== undefined && c.vma20 > maxVMA) maxVMA = c.vma20;
    }
    if (minP === Infinity || maxP === -Infinity) { minP = 0; maxP = 100; }
    const padding = (maxP - minP) * 0.08;
    minP -= padding; maxP += padding;
    if (maxVol === 0 || !isFinite(maxVol)) maxVol = 1;
    if (maxVMA === 0 || !isFinite(maxVMA)) maxVMA = 1;

    // Holding highlight
    if (position) {
      const entryVisible = position.entryIdx >= startIdx && position.entryIdx <= endIdx;
      if (entryVisible) {
        const hx0 = chartLeft + (position.entryIdx - startIdx) * candleSpace;
        const hx1 = chartLeft + (cursor - startIdx) * candleSpace + candleSpace;
        ctx.fillStyle = 'rgba(88,166,255,0.06)';
        ctx.fillRect(hx0, priceTop, hx1 - hx0, volBottom - priceTop);
      }
    }

    // Price grid
    ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
    const gridLines = 5;
    for (let i = 0; i <= gridLines; i++) {
      const y = priceTop + (i/gridLines) * priceHeight;
      ctx.beginPath(); ctx.moveTo(chartLeft, y); ctx.lineTo(chartRight, y); ctx.stroke();
      ctx.fillStyle = '#484f58'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
      ctx.fillText((maxP - (i/gridLines)*(maxP-minP)).toFixed(1), chartLeft - 4, y + 3);
    }

    // Volume separator
    ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(chartLeft, volTop); ctx.lineTo(chartRight, volTop); ctx.stroke();

    // Volume grid
    ctx.fillStyle = '#484f58'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
    for (let i = 1; i <= 2; i++) {
      const y = volTop + (i/2) * volHeight;
      const vol = maxVol * (1 - i/2);
      const lbl = vol >= 1e9 ? (vol/1e9).toFixed(1)+'B' : vol >= 1e6 ? (vol/1e6).toFixed(1)+'M' : vol.toFixed(0);
      ctx.fillText(lbl, chartLeft - 4, y + 3);
    }

    // Volume bars
    const bw = Math.max(candleSpace * 0.7, 0.5);
    for (let i = startIdx; i <= endIdx; i++) {
      const c = DATA[i];
      if (!c || c.volume === undefined || c.close === undefined || c.open === undefined) continue;
      const x = chartLeft + (i - startIdx) * candleSpace + candleSpace * 0.15;
      const h = Math.max((c.volume / maxVol) * volHeight, c.volume > 0 ? 0.8 : 0);
      const y = volBottom - h;
      ctx.fillStyle = (c.close >= c.open) ? 'rgba(63,185,80,0.4)' : 'rgba(248,81,73,0.4)';
      ctx.fillRect(x, y, bw, h);
    }

    // VMA lines (use independent maxVMA scale so they don't get squished by volume outliers)
    function drawVMA(key, color, lw, dash) {
      ctx.strokeStyle = color; ctx.lineWidth = lw;
      if (dash) ctx.setLineDash([3, 2]); else ctx.setLineDash([]);
      ctx.beginPath(); let started = false;
      for (let i = startIdx; i <= endIdx; i++) {
        const c = DATA[i];
        if (!c || c[key] === undefined || c[key] <= 0 || maxVMA <= 0) continue;
        const cx = chartLeft + (i - startIdx) * candleSpace + candleSpace / 2;
        const vy = volBottom - (c[key] / maxVMA) * volHeight;
        if (!started) { ctx.moveTo(cx, vy); started = true; }
        else ctx.lineTo(cx, vy);
      }
      ctx.stroke(); ctx.setLineDash([]);
    }
    drawVMA('vma10', '#58a6ff', 1.5, false);
    drawVMA('vma20', '#f85149', 2, true);

    // Volume legend
    const vLX = chartRight - 4, vLY = volTop + 6;
    ctx.font = '8px monospace'; ctx.textAlign = 'right';
    ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(vLX-45, vLY); ctx.lineTo(vLX-33, vLY); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.fillText('VMA10', vLX-36, vLY+3);
    ctx.strokeStyle = '#f85149'; ctx.lineWidth = 2; ctx.setLineDash([3,2]);
    ctx.beginPath(); ctx.moveTo(vLX-18, vLY); ctx.lineTo(vLX-6, vLY); ctx.stroke();
    ctx.setLineDash([]); ctx.fillText('VMA20', vLX, vLY+3);

    // Cursor column highlight (subtle background, behind candles)
    const cxHigh = chartLeft + (cursor - startIdx) * candleSpace;
    ctx.fillStyle = 'rgba(88,166,255,0.06)';
    ctx.fillRect(cxHigh, priceTop, candleSpace, volBottom - priceTop);
    // Small marker dots at top/bottom of current candle
    const curCX = chartLeft + (cursor - startIdx) * candleSpace + candleSpace / 2;
    ctx.fillStyle = '#58a6ff';
    ctx.beginPath(); ctx.arc(curCX, priceTop - 2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(curCX, volBottom + 2, 3, 0, Math.PI * 2); ctx.fill();

    // Candles
    const candleW = Math.max(candleSpace * 0.7, 0.8);
    for (let i = startIdx; i <= endIdx; i++) {
      const c = DATA[i];
      if (!c || c.open === undefined || c.high === undefined || c.low === undefined || c.close === undefined) continue;
      const cx = chartLeft + (i - startIdx) * candleSpace + candleSpace / 2;
      const isUp = c.close >= c.open;
      const color = isUp ? '#3fb950' : '#f85149';
      const bodyColor = isUp ? 'rgba(63,185,80,0.85)' : 'rgba(248,81,73,0.85)';
      const bodyH = Math.abs((c.close - c.open) / (maxP - minP)) * priceHeight;
      const bodyY = priceTop + (1 - (Math.max(c.open, c.close) - minP) / (maxP - minP)) * priceHeight;
      const lowY = priceTop + (1 - (c.low - minP) / (maxP - minP)) * priceHeight;
      const highY = priceTop + (1 - (c.high - minP) / (maxP - minP)) * priceHeight;

      ctx.strokeStyle = color; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx, lowY); ctx.lineTo(cx, highY); ctx.stroke();

      if (bodyH < 0.5) {
        ctx.strokeStyle = bodyColor; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx - candleW/2, priceTop + (1 - (c.close - minP) / (maxP - minP)) * priceHeight);
        ctx.lineTo(cx + candleW/2, priceTop + (1 - (c.close - minP) / (maxP - minP)) * priceHeight);
        ctx.stroke();
      } else {
        ctx.fillStyle = bodyColor;
        ctx.fillRect(cx - candleW/2, bodyY, candleW, bodyH);
      }
    }

    // Entry price line
    if (position) {
      const entryY = priceTop + (1 - (position.entryPrice - minP) / (maxP - minP)) * priceHeight;
      if (entryY >= priceTop && entryY <= priceBottom) {
        ctx.strokeStyle = '#d29922'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 4]);
        ctx.beginPath(); ctx.moveTo(chartLeft, entryY); ctx.lineTo(chartRight, entryY); ctx.stroke();
        ctx.setLineDash([]);
        const entryX = chartLeft + (position.entryIdx - startIdx) * candleSpace + candleSpace / 2;
        ctx.fillStyle = '#d29922';
        ctx.beginPath();
        ctx.moveTo(entryX, entryY - 7);
        ctx.lineTo(entryX - 4, entryY - 1);
        ctx.lineTo(entryX + 4, entryY - 1);
        ctx.closePath(); ctx.fill();
      }
    }

    // Lowest point marker
    if (lowestIdx >= 0) {
      const lowC = DATA[lowestIdx];
      const lx = chartLeft + (lowestIdx - startIdx) * candleSpace + candleSpace / 2;
      const ly = priceTop + (1 - (lowC.low - minP) / (maxP - minP)) * priceHeight;
      // Small red dot at the exact low
      ctx.fillStyle = '#f85149';
      ctx.beginPath(); ctx.arc(lx, ly, 2.5, 0, Math.PI * 2); ctx.fill();
      // Price label below the dot (not overlapping the wick)
      const label = lowC.low.toFixed(2);
      ctx.font = 'bold 9px monospace';
      const tw = ctx.measureText(label).width;
      const lblY = ly + 14;
      ctx.fillStyle = 'rgba(22,27,34,0.85)';
      ctx.fillRect(lx - tw/2 - 3, lblY - 8, tw + 6, 12);
      ctx.fillStyle = '#f85149';
      ctx.textAlign = 'center';
      ctx.fillText(label, lx, lblY);
    }

    updateChartInfo(endIdx);
  } catch(err) {
    document.getElementById('chart-info').innerHTML = '<span style="color:#f85149;">Err: ' + err.message + '</span>';
  }
}

function updateChartInfo(idx) {
  const c = DATA[idx];
  const info = document.getElementById('chart-info');
  if (!c) {
    info.innerHTML = '<span style="color:#f85149;">No data at index ' + idx + '</span>';
    return;
  }
  const open = c.open !== undefined ? c.open : 0;
  const high = c.high !== undefined ? c.high : 0;
  const low = c.low !== undefined ? c.low : 0;
  const close = c.close !== undefined ? c.close : 0;
  const volume = c.volume !== undefined ? c.volume : 0;
  const pct = c.pct !== undefined ? c.pct : 0;
  const pctClass = pct >= 0 ? 'pct-up' : 'pct-down';
  const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
  let volStr = volume >= 1e9 ? (volume/1e9).toFixed(2)+'B' : volume >= 1e6 ? (volume/1e6).toFixed(2)+'M' : volume.toLocaleString();

  let plLine = '';
  if (position) {
    const pl = ((close - position.entryPrice) / position.entryPrice * 100);
    const plCls = pl >= 0 ? 'pct-up' : 'pct-down';
    const days = idx - position.entryIdx;
    plLine = '<br><span class="holding">Holding ' + days + 'd | ' + (pl >= 0 ? '+' : '') + pl.toFixed(2) + '%</span>';
  }

  info.innerHTML = [
    '<span class="date">' + (c.date || 'N/A') + ' | ' + currentCode + '.HK</span><br>',
    '<span class="ohlc">O:' + open.toFixed(2) + ' H:' + high.toFixed(2) + ' L:' + low.toFixed(2) + ' C:' + close.toFixed(2) + '</span><br>',
    '<span class="' + pctClass + '">' + pctStr + '</span>',
    ' <span class="ohlc">Vol:' + volStr + '</span>',
    plLine
  ].join('');
}

// ===== TRADE ACTIONS =====
function buyAtClose() {
  if (position) { showToast('Already in position'); return; }
  if (!DATA || !DATA.length || cursor < 0 || cursor >= DATA.length - 1) { showToast('Cannot buy last day'); return; }
  const closePrice = DATA[cursor].close !== undefined ? DATA[cursor].close : 0;
  if (closePrice <= 0 || cash <= 0) { showToast('No cash or invalid price'); return; }
  // Buy all: use full cash, deduct 0.1% cost
  const maxShares = Math.floor(cash / closePrice);
  if (maxShares <= 0) { showToast('Not enough cash'); return; }
  const grossCost = maxShares * closePrice;
  const buyCost = grossCost * TRADE_COST;
  const totalCost = grossCost + buyCost;
  if (totalCost > cash) {
    // Adjust: buy one less share if needed
    const adjShares = maxShares - 1;
    if (adjShares <= 0) { showToast('Not enough cash after cost'); return; }
    shares = adjShares;
    const adjGross = adjShares * closePrice;
    const adjBuyCost = adjGross * TRADE_COST;
    cash -= (adjGross + adjBuyCost);
  } else {
    shares = maxShares;
    cash -= totalCost;
  }
  position = {
    entryIdx: cursor,
    entryPrice: closePrice,
    entryDate: DATA[cursor].date || 'N/A',
    shares: shares,
    buyCost: shares * closePrice * TRADE_COST
  };
  showToast('Bought ' + shares + ' sh @ ' + closePrice.toFixed(2) + ' (fee ' + position.buyCost.toFixed(2) + ')');
  updateUI(); draw();
}

function sellAtClose() {
  if (!position) { showToast('No position'); return; }
  if (!DATA || !DATA.length || cursor < 0 || cursor >= DATA.length) { showToast('Invalid data'); return; }
  if (cursor === position.entryIdx) { showToast('Need to move forward'); return; }

  const exitPrice = DATA[cursor].close !== undefined ? DATA[cursor].close : 0;
  const days = cursor - position.entryIdx;
  const grossSale = shares * exitPrice;
  const sellCost = grossSale * TRADE_COST;
  const netSale = grossSale - sellCost;
  const buyGross = position.shares * position.entryPrice;
  const totalCost = position.buyCost + sellCost;
  const netPl = netSale - buyGross;
  const plPct = (netPl / buyGross * 100);

  cash += netSale;
  const soldShares = shares;
  shares = 0;

  trades.push({
    num: trades.length + 1,
    entryDate: position.entryDate, entryIdx: position.entryIdx, entryPrice: position.entryPrice,
    exitDate: DATA[cursor].date, exitIdx: cursor, exitPrice: exitPrice,
    days: days, plPct: plPct, shares: soldShares,
    buyCost: position.buyCost, sellCost: sellCost, netPl: netPl
  });

  const emoji = plPct >= 0 ? '&#x1F4C8; Profit' : '&#x1F4C9; Loss';
  showToast(emoji + ': ' + (plPct >= 0 ? '+' : '') + plPct.toFixed(2) + '% (net ¥' + netPl.toFixed(2) + ')');
  position = null;
  updateUI(); draw();
}

function cancelPosition() {
  if (!position) return;
  // Return cash (buy cost already deducted)
  cash += (position.shares * position.entryPrice + position.buyCost);
  shares = 0;
  position = null;
  showToast('Cancelled');
  updateUI(); draw();
}

function jumpDays(n) {
  if (!DATA || !DATA.length) return;
  const maxIdx = DATA.length - 1;
  if (isNaN(cursor)) cursor = Math.min(START_INDEX, maxIdx);
  cursor = Math.max(0, Math.min(cursor + n, maxIdx));
  // Blind replay: advancing cursor also unlocks forward progress
  if (cursor > maxCursor) maxCursor = cursor;
  updateUI(); draw();
}

function resetAll() {
  cursor = START_INDEX; maxCursor = START_INDEX; position = null; trades = [];
  cash = INITIAL_CAPITAL; shares = 0;
  updateUI(); draw();
}

// ===== STOCK SEARCH =====
const searchBox = document.getElementById('search-box');
const dropdown = document.getElementById('dropdown');

function filterStocks(query) {
  dropdown.innerHTML = '';
  if (!query) { dropdown.classList.remove('open'); return; }

  const q = query.toUpperCase();
  const matches = STOCK_LIST.filter(function(s) {
    return s.c === q || s.c.startsWith(q) || s.n.toUpperCase().includes(q);
  }).slice(0, 30);

  if (matches.length === 0) {
    dropdown.classList.remove('open');
    return;
  }

  matches.forEach(function(s) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = '<span class="code">' + s.c + '</span><span class="name">' + s.n + '</span>';
    div.addEventListener('click', function() {
      dropdown.classList.remove('open');
      loadStockData(s.c, s.n);
    });
    dropdown.appendChild(div);
  });
  dropdown.classList.add('open');
}

searchBox.addEventListener('input', function() {
  filterStocks(this.value.trim());
});

searchBox.addEventListener('focus', function() {
  if (this.value.trim()) filterStocks(this.value.trim());
});

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  if (!searchBox.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.classList.remove('open');
  }
});

// ===== SWIPE & PINCH =====
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let lastTapTime = 0;
let pinchStartDist = 0, pinchStartVisible = 0;

canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx*dx + dy*dy);
    pinchStartVisible = candlesVisible;
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const scale = dist / pinchStartDist;
    const newVisible = Math.round(pinchStartVisible / scale);
    const clamped = Math.max(CANDLES_MIN, Math.min(CANDLES_MAX, newVisible));
    if (clamped !== candlesVisible) {
      candlesVisible = clamped;
      draw();
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  if (e.touches.length > 0 || e.changedTouches.length !== 1) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);

  if (absDx > 25 && absDx > absDy * 1.5) {
    const steps = Math.round(absDx / 40);
    cursor = Math.max(0, Math.min(cursor + (dx > 0 ? -steps : steps), maxCursor));
    updateUI(); draw();
    return;
  }

  if (absDx < 10 && absDy < 10 && dt < 300) {
    const now = Date.now();
    if (now - lastTapTime < 350) {
      const halfW = canvas.getBoundingClientRect().width / 2;
      if (e.changedTouches[0].clientX > canvas.getBoundingClientRect().left + halfW) {
        jumpDays(1);
      } else {
        jumpDays(-1);
      }
    }
    lastTapTime = now;
  }
});

// ===== UPDATE UI =====
function updateUI() {
  const total = trades.length;
  const wins = trades.filter(function(t) { return t.plPct >= 0; }).length;
  const winRate = total > 0 ? (wins/total*100).toFixed(1) + '%' : '-';
  const totalNetPl = trades.reduce(function(s, t) { return s + (t.netPl || 0); }, 0);
  const totalPlPct = total > 0 ? (totalNetPl / INITIAL_CAPITAL * 100) : 0;
  // Portfolio value: cash + unrealized stock value
  let portfolioValue = cash;
  if (position) {
    const curPrice = DATA[cursor].close !== undefined ? DATA[cursor].close : 0;
    portfolioValue = cash + shares * curPrice;
  }
  const totalPl = portfolioValue - INITIAL_CAPITAL;
  const totalPct = (totalPl / INITIAL_CAPITAL * 100);

  document.getElementById('stat-capital').textContent = '¥' + portfolioValue.toLocaleString('en-US', {maximumFractionDigits: 0});
  const capEl = document.getElementById('stat-capital');
  capEl.style.color = totalPl >= 0 ? '#3fb950' : '#f85149';
  document.getElementById('stat-trades').textContent = total;
  document.getElementById('stat-winrate').textContent = winRate;
  const tpe = document.getElementById('stat-totalpl');
  tpe.textContent = (totalPl >= 0 ? '+' : '') + totalPct.toFixed(2) + '%';
  tpe.className = 'val ' + (total !== 0 ? (totalPl >= 0 ? 'win' : 'loss') : 'neutral');
  document.getElementById('stat-day').textContent = cursor - START_INDEX + 1;
  document.getElementById('log-count').textContent = total;

  const slider = document.getElementById('slider');
  slider.max = maxCursor;
  slider.value = cursor;
  document.getElementById('slider-val').textContent = DATA[cursor].date;

  const banner = document.getElementById('pos-banner');
  const btnBuy = document.getElementById('btn-buy');
  const btnSell = document.getElementById('btn-sell');
  const btnCancel = document.getElementById('btn-cancel');

  if (position) {
    banner.classList.add('active');
    const curPrice = DATA[cursor].close !== undefined ? DATA[cursor].close : 0;
    const mktValue = shares * curPrice;
    const grossPl = mktValue - (shares * position.entryPrice);
    const netPl = grossPl - position.buyCost - (mktValue * TRADE_COST); // unrealized net (incl sell cost)
    const plPct = (netPl / (shares * position.entryPrice) * 100);
    const days = cursor - position.entryIdx;
    document.getElementById('pos-date').textContent = shares + ' sh @ ' + position.entryPrice.toFixed(2);
    document.getElementById('pos-price').textContent = 'Value: ¥' + mktValue.toLocaleString('en-US', {maximumFractionDigits: 0});
    document.getElementById('pos-days').textContent = days + 'd';
    const ple = document.getElementById('pos-pl');
    ple.textContent = (plPct >= 0 ? '+' : '') + plPct.toFixed(2) + '%';
    ple.className = 'pos-pl ' + (plPct >= 0 ? 'up' : 'down');
    btnBuy.disabled = true;
    btnSell.disabled = (cursor === position.entryIdx);
    btnCancel.disabled = false;
  } else {
    banner.classList.remove('active');
    btnBuy.disabled = (cursor >= DATA.length - 1 || cash <= 0);
    btnSell.disabled = true;
    btnCancel.disabled = true;
  }

  const tbody = document.getElementById('trade-log-body');
  tbody.innerHTML = '';
  trades.slice().reverse().forEach(function(t) {
    const tr = document.createElement('tr');
    const netPlStr = (t.netPl !== undefined) ? ('¥' + t.netPl.toFixed(0)) : ('-');
    tr.innerHTML = [
      '<td style="text-align:left;">' + t.num + '</td>',
      '<td style="text-align:left;">' + t.entryDate + '</td>',
      '<td>' + t.entryPrice.toFixed(2) + '</td>',
      '<td style="text-align:left;">' + t.exitDate + '</td>',
      '<td>' + t.exitPrice.toFixed(2) + '</td>',
      '<td>' + (t.shares || 0) + '</td>',
      '<td>' + t.days + '</td>',
      '<td class="' + (t.plPct >= 0 ? 'profit' : 'loss') + '">' + (t.plPct >= 0 ? '+' : '') + t.plPct.toFixed(2) + '%</td>'
    ].join('');
    tbody.appendChild(tr);
  });
}

function toggleLog() {
  const toggle = document.getElementById('log-toggle');
  const log = document.getElementById('trade-log');
  toggle.classList.toggle('open');
  log.classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ===== SLIDER =====
document.getElementById('slider').addEventListener('input', function(e) {
  cursor = Math.min(parseInt(e.target.value), maxCursor);
  updateUI(); draw();
});

// ===== INIT =====
computeIndicators(DATA);
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', function() {
  setTimeout(resizeCanvas, 300);
});
resizeCanvas();
updateUI();
</script>
